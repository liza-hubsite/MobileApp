<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        /* 1. RESET & HEADER SPACING */
        .main-content {
            padding-top: 65px !important;
            margin: 0 !important;
        }

        /* 2. GREETING & STATUS */
        .status-header-box {
            padding: 10px 20px 0px !important;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .greeting-text h1 { font-size: 28px; margin: 0; line-height: 1; color: #20193C; font-weight: 800; }
        .greeting-text p { font-size: 11px; margin: 0 0 2px; opacity: 0.5; font-weight: 900; text-transform: uppercase; }

        .day-badge {
            background: white; border-radius: 20px; padding: 8px 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); display: flex; align-items: center; gap: 8px;
        }

        /* 3. TOP QUICK LOG PILLS */
        .top-log-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 10px 20px;
        }
        .top-log-item {
            background: white; border-radius: 18px; padding: 15px 10px;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); cursor: pointer;
            transition: all 0.2s ease;
        }
        .top-log-label { font-size: 8px; font-weight: 900; opacity: 0.6; text-transform: uppercase; }

        /* 4. CARDS (TREND & CALENDAR) */
        .card {
            margin: 5px 20px !important;
            padding: 15px !important;
            border-radius: 28px !important;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        /* 5. TELEMETRY */
        .telemetry-row {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            padding: 10px 20px;
        }
        .metric-card {
            flex: 1; background: white; border-radius: 16px; padding: 12px 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); display: flex; flex-direction: column;
            border-top: 4px solid #eee; text-align: center;
        }
        .metric-label { font-size: 7px; font-weight: 900; opacity: 0.3; text-transform: uppercase; margin-bottom: 4px; }
        .metric-value { font-size: 15px; font-weight: 800; color: #20193C; line-height: 1; }
        .metric-unit { font-size: 9px; opacity: 0.3; font-weight: 700; display: block; margin-top: 2px; }

        /* 6. CALENDAR GRID */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-top: 12px; }
        .cal-header-day { font-size: 8px; font-weight: 900; opacity: 0.3; text-align: center; padding-bottom: 5px; }
        .cal-date {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            font-size: 11px; border-radius: 50%; position: relative; color: #20193C;
        }
        .is-today { font-weight: 900 !important; font-size: 13px; }
        .is-tracked { background: #BC3E2D; color: white !important; font-weight: 800; }
        .is-predicted { background: rgba(188, 62, 45, 0.1); color: #BC3E2D; }
        .is-ovulation { border: 2.5px solid #D25215; color: #D25215; }
        .ov-dot { position: absolute; bottom: 3px; width: 4px; height: 4px; background: #D25215; border-radius: 50%; }

        #homeSnapshotChart { width: 100% !important; height: 150px !important; }

        /* FEEDBACK ANIMATION */
        .fa-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="app-container">

    <header class="app-header">
        <img src="logo.png" class="logo-img" alt="Elivive">
        <i class="fa-solid fa-cog" onclick="location.href='settings.html'"></i>
    </header>

    <main class="main-content">
        <div class="status-header-box">
            <div class="greeting-text">
                <p id="current-date"></p>
                <h1>Hi Liza 👋</h1>
            </div>
            <div class="day-badge">
                <span style="font-size: 22px; font-weight: 900; color:#20193C;">03</span>
                <div style="display:flex; flex-direction:column; line-height:1;">
                    <span style="font-size: 7px; font-weight: 900; opacity:0.4;">DAY</span>
                    <span style="font-size: 8px; font-weight: 900; color:#BC3E2D;">MENSTRUAL</span>
                </div>
            </div>
        </div>

        <div class="top-log-row">
            <div class="top-log-item" id="log-Headache" onclick="logSymptom('Headache', 'fa-head-side-virus', '#BC3E2D')">
                <i class="fa-solid fa-head-side-virus" style="color:#BC3E2D"></i>
                <span class="top-log-label">Headache</span>
            </div>
            <div class="top-log-item" id="log-Cramps" onclick="logSymptom('Cramps', 'fa-bolt', '#D25215')">
                <i class="fa-solid fa-bolt" style="color:#D25215"></i>
                <span class="top-log-label">Cramps</span>
            </div>
            <div class="top-log-item" id="log-Fatigue" onclick="logSymptom('Fatigue', 'fa-bed', '#8F1858')">
                <i class="fa-solid fa-bed" style="color:#8F1858"></i>
                <span class="top-log-label">Fatigue</span>
            </div>
        </div>

        <div class="card">
            <h3 style="margin:0 0 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; opacity: 0.4;">Hormone Trend</h3>
            <canvas id="homeSnapshotChart"></canvas>
        </div>

        <div class="telemetry-row">
            <div class="metric-card" style="border-top-color: #BC3E2D;">
                <span class="metric-label">Heart Rate</span>
                <span class="metric-value">72 <span class="metric-unit">bpm</span></span>
            </div>
            <div class="metric-card" style="border-top-color: #D25215;">
                <span class="metric-label">Sleep</span>
                <span class="metric-value">7.5 <span class="metric-unit">hrs</span></span>
            </div>
            <div class="metric-card" style="border-top-color: #0891b2;">
                <span class="metric-label">Basal Temp</span>
                <span class="metric-value">97.8 <span class="metric-unit">°F</span></span>
            </div>
        </div>

        <div class="card" style="margin-bottom: 110px !important;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0; font-size: 10px; font-weight: 900; text-transform: uppercase; opacity: 0.4;">Cycle Forecast</h3>
                <span id="month-name" style="font-size: 11px; font-weight: 900; color: #BC3E2D;"></span>
            </div>
            <div class="calendar-grid" id="calendarGrid">
                <div class="cal-header-day">S</div><div class="cal-header-day">M</div><div class="cal-header-day">T</div>
                <div class="cal-header-day">W</div><div class="cal-header-day">T</div><div class="cal-header-day">F</div>
                <div class="cal-header-day">S</div>
            </div>
        </div>
    </main>

    <footer class="app-footer">
        <a href="home.html" class="nav-item active"><i class="fa-solid fa-house"></i>Home</a>
        <a href="insights.html" class="nav-item"><i class="fa-solid fa-lightbulb"></i>Insights</a>
        <div class="nav-center-btn" onclick="openGlobalLog()"><i class="fa-solid fa-plus"></i></div>
        <a href="charts.html" class="nav-item"><i class="fa-solid fa-chart-line"></i>Charts</a>
        <a href="ai.html" class="nav-item"><i class="fa-solid fa-wand-magic-sparkles"></i>AI Chat</a>
    </footer>

    <script>
        function openGlobalLog() {
            localStorage.setItem('triggerLogMenu', 'true');
            window.location.href = 'insights.html';
        }

        // IMPROVED LOGGING FEEDBACK
        function logSymptom(name, originalIcon, color) {
            const item = document.getElementById(`log-${name}`);
            const icon = item.querySelector('i');
            
            // 1. Show Spinner
            icon.className = "fa-solid fa-circle-notch fa-spinner";
            
            // 2. Save Data
            let count = parseInt(localStorage.getItem(name + "_count") || "0");
            localStorage.setItem(name + "_count", count + 1);

            // 3. Show Checkmark then Reset
            setTimeout(() => {
                icon.className = "fa-solid fa-check";
                icon.style.color = "#4CAF50"; // Green for success
                
                setTimeout(() => {
                    icon.className = `fa-solid ${originalIcon}`;
                    icon.style.color = color;
                }, 1500);
            }, 800);
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const monthLabel = document.getElementById('month-name');
            const now = new Date();
            monthLabel.innerText = now.toLocaleString('default', { month: 'long' }).toUpperCase();
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
            const totalDays = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const today = now.getDate();
            for (let i = 0; i < firstDay; i++) { grid.innerHTML += '<div></div>'; }
            for (let day = 1; day <= totalDays; day++) {
                let classes = "cal-date"; let extra = "";
                if (day === today - 1 || day === today - 2) classes += " is-tracked";
                else if (day >= today && day <= today + 4) classes += " is-predicted";
                if (day === today) classes += " is-today";
                if (day === (today + 11)) { classes += " is-ovulation"; extra = '<div class="ov-dot"></div>'; }
                grid.innerHTML += `<div class="${classes}">${day}${extra}</div>`;
            }
        }

        function initSnapshotChart() {
            const ctx = document.getElementById('homeSnapshotChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: 28}, (_, i) => i + 1),
                    datasets: [
                        { data: [0.8, 0.7, 0.6, 0.6, 0.5, 0.5, 0.5, 0.6, 0.7, 0.8, 0.9, 1.0, 1.2, 1.5, 5, 12, 18, 22, 25, 24, 20, 15, 10, 6, 3, 1.5, 1, 0.9], borderColor: '#8F1858', tension: 0.4, pointRadius: 0, borderWidth: 3.5 },
                        { data: [40, 35, 30, 35, 45, 60, 85, 110, 150, 200, 250, 300, 380, 420, 150, 130, 160, 180, 190, 185, 170, 150, 120, 90, 70, 55, 45, 40], borderColor: '#D25215', tension: 0.4, pointRadius: 0, borderWidth: 3.5 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { display: false } }, plugins: { legend: { display: false } } }
            });
        }

        window.onload = () => {
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            initSnapshotChart();
            renderCalendar();
        };
    </script>
</body>
</html>
