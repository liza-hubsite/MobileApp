<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        .status-container {
            position: relative;
            padding: 20px 0 10px;
            display: flex; justify-content: center; align-items: center;
            height: 180px;
            overflow: hidden;
        }
        .liquid-glow {
            position: absolute;
            width: 130px; height: 130px;
            background: var(--highlight);
            filter: blur(40px);
            opacity: 0.15;
            border-radius: 50%;
            animation: pulse-glow 4s infinite alternate;
        }
        @keyframes pulse-glow {
            from { transform: scale(1); opacity: 0.1; }
            to { transform: scale(1.4); opacity: 0.25; }
        }
        .main-status-circle {
            width: 140px; height: 140px;
            border-radius: 50% !important;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 2;
            margin: 0 !important;
        }

        #sync-toast {
            position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
            background: var(--text-main); color: white; padding: 10px 20px;
            border-radius: 30px; font-size: 12px; display: flex; align-items: center;
            gap: 10px; z-index: 3000; transition: top 0.5s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        #sync-toast.show { top: 80px; }
        .spinner { animation: rotate 2s linear infinite; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .log-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px 10px; margin-top: 15px; }
        .log-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .icon-circle {
            width: 48px; height: 48px; border-radius: 16px; 
            background: rgba(255,255,255,0.7);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 6px; border: 1px solid rgba(255,255,255,0.3);
            font-size: 18px; transition: all 0.2s;
        }
        .log-item:active .icon-circle { transform: scale(0.9); background: white; }
        .log-label { font-size: 9px; font-weight: 800; color: var(--text-main); text-transform: uppercase; letter-spacing: 0.5px; text-align: center;}

        /* Brand Colors */
        .ic-red { color: #BC3E2D; } .ic-berry { color: #8F1858; } .ic-orange { color: #D25215; }
        .ic-teal { color: #0891b2; } .ic-pink { color: #db2777; } .ic-green { color: #6D597A; }
        .ic-purple { color: #7c3aed; } .ic-blue { color: #2563eb; } .ic-gold { color: #d97706; }

        #homeSnapshotChart { width: 100% !important; height: 200px !important; }
    </style>
</head>
<body class="app-container">
    <div id="sync-toast">
        <i class="fa-solid fa-circle-notch spinner"></i>
        <span>Syncing...</span>
    </div>

    <header class="app-header">
        <img src="logo.png" class="logo-img" alt="Elivive">
        <i class="fa-solid fa-cog" onclick="location.href='settings.html'" style="color: var(--text-main); cursor: pointer;"></i>
    </header>

    <main class="main-content">
        <div class="status-container">
            <div class="liquid-glow"></div>
            <div class="card main-status-circle">
                <span style="font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.6; font-weight: 800;">Day</span>
                <h1 style="font-size: 42px; margin: -5px 0; font-weight: 800; color: var(--text-main);">03</h1>
                <span style="font-size: 10px; font-weight: 800; color: var(--highlight);">MENSTRUAL</span>
            </div>
        </div>

        <div style="padding: 0 20px; text-align: center;">
            <p id="current-date" style="margin:0; opacity:0.5; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-main);"></p>
            <h1 style="margin:5px 0 15px; font-size: 24px; color: var(--text-main);">Hi Liza 👋</h1>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <h3 style="margin:0; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6;">30-Day Hormone Snapshot</h3>
                <i class="fa-solid fa-chevron-right" style="font-size: 10px; opacity: 0.3;" onclick="location.href='charts.html'"></i>
            </div>
            <canvas id="homeSnapshotChart"></canvas>
        </div>

        <div class="card" style="border-left: 4px solid var(--highlight);">
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
                <i class="fa-solid fa-sparkles" style="color: var(--highlight); font-size: 14px;"></i>
                <h3 style="margin:0; font-size: 13px; font-weight: 800;">Daily Brief</h3>
            </div>
            <p style="font-size: 12px; color: var(--text-main); opacity: 0.8; line-height: 1.6; margin: 0;">
                Hormones are at baseline. Your body is in "reset" mode. Focus on hydration and gentle movement today.
            </p>
        </div>

        <div class="card">
            <h3 style="margin:0; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6;">Symptom Log</h3>
            <div class="log-grid">
                <div class="log-item" onclick="logSymptom('headache', 'Headache')">
                    <div class="icon-circle ic-red"><i class="fa-solid fa-head-side-virus"></i></div>
                    <span class="log-label">Headache</span>
                </div>
                <div class="log-item" onclick="logSymptom('tired', 'Fatigue')">
                    <div class="icon-circle ic-berry"><i class="fa-solid fa-bed"></i></div>
                    <span class="log-label">Fatigue</span>
                </div>
                <div class="log-item" onclick="logSymptom('cramps', 'Cramps')">
                    <div class="icon-circle ic-orange"><i class="fa-solid fa-bolt"></i></div>
                    <span class="log-label">Cramps</span>
                </div>
                <div class="log-item" onclick="logSymptom('bloated', 'Bloating')">
                    <div class="icon-circle ic-teal"><i class="fa-solid fa-wind"></i></div>
                    <span class="log-label">Bloating</span>
                </div>
                <div class="log-item" onclick="logSymptom('breast', 'Breast')">
                    <div class="icon-circle ic-pink"><i class="fa-solid fa-circle-dot"></i></div>
                    <span class="log-label">Breast</span>
                </div>
                <div class="log-item" onclick="logSymptom('nausea', 'Nausea')">
                    <div class="icon-circle ic-green"><i class="fa-solid fa-frown"></i></div>
                    <span class="log-label">Nausea</span>
                </div>
                <div class="log-item" onclick="logSymptom('mood', 'Mood')">
                    <div class="icon-circle ic-purple"><i class="fa-solid fa-masks-theater"></i></div>
                    <span class="log-label">Mood</span>
                </div>
                <div class="log-item" onclick="logSymptom('anxiety', 'Anxiety')">
                    <div class="icon-circle ic-blue"><i class="fa-solid fa-brain"></i></div>
                    <span class="log-label">Anxiety</span>
                </div>
                <div class="log-item" onclick="logSymptom('cravings', 'Cravings')">
                    <div class="icon-circle ic-gold"><i class="fa-solid fa-cookie-bite"></i></div>
                    <span class="log-label">Cravings</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="app-footer">
        <a href="home.html" class="nav-item active"><i class="fa-solid fa-house"></i>Home</a>
        <a href="insights.html" class="nav-item"><i class="fa-solid fa-lightbulb"></i>Insights</a>
        <a href="charts.html" class="nav-item"><i class="fa-solid fa-chart-line"></i>Charts</a>
        <a href="ai.html" class="nav-item"><i class="fa-solid fa-wand-magic-sparkles"></i>AI Chat</a>
    </footer>

    <script>
        const SEED = 42.0;
        function seededRandom(s) { const x = Math.sin(s) * 10000; return x - Math.floor(x); }

        function generateData(hours) {
            const data = { prog: [], est: [], labels: [] };
            const now = new Date();
            let currentCycleDay = 3;

            for (let i = hours; i >= 0; i--) {
                const hourDate = new Date(now.getTime() - i * 60 * 60 * 1000);
                const totalHoursAgo = hours - i;
                const cycleId = Math.floor((totalHoursAgo + (currentCycleDay * 24)) / (28 * 24));
                const vSeed = SEED + cycleId;
                const varCycleLen = 26 + seededRandom(vSeed) * 6;
                const cyclePosHours = (currentCycleDay * 24 + totalHoursAgo) % (varCycleLen * 24);
                const day = cyclePosHours / 24;

                const varEstPeak = 250 + seededRandom(vSeed + 1) * 250;
                const varProgPeak = 12 + seededRandom(vSeed + 2) * 12;
                const ovulationDay = varCycleLen - 14 + (seededRandom(vSeed + 3) * 2 - 1);

                let est, prog;
                if (day <= 5) {
                    est = 38 - (day * 4.5); 
                    prog = 0.9 - (day * 0.2);
                } else if (day > 5 && day <= ovulationDay) {
                    est = 20 + Math.pow((day-5)/(ovulationDay-5), 3) * varEstPeak;
                    prog = 0.2;
                } else {
                    const peakDay = ovulationDay + 7;
                    const distFromPeak = Math.abs(day - peakDay);
                    prog = 0.5 + Math.max(0, varProgPeak * Math.exp(-(distFromPeak * distFromPeak) / 10));
                    const lutealDay = day - (ovulationDay + 2);
                    est = 60 + Math.sin((lutealDay / 8) * Math.PI) * (varEstPeak * 0.35);
                }
                data.est.push(est + (seededRandom(i)-0.5)*2);
                data.prog.push(prog + (seededRandom(i+50)-0.5)*0.04);
                data.labels.push(hourDate);
            }
            return data;
        }

        function initSnapshotChart() {
            const data = generateData(720); 
            const ctx = document.getElementById('homeSnapshotChart').getContext('2d');
            
            const downsampledLabels = data.labels.filter((_, i) => i % 24 === 0);
            const downsampledProg = data.prog.filter((_, i) => i % 24 === 0);
            const downsampledEst = data.est.filter((_, i) => i % 24 === 0);

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: downsampledLabels,
                    datasets: [
                        { label: 'Prog', data: downsampledProg, borderColor: '#8F1858', yAxisID: 'yProg', tension: 0.6, pointRadius: 0, borderWidth: 2 },
                        { label: 'Est', data: downsampledEst, borderColor: '#D25215', yAxisID: 'yEst', tension: 0.6, pointRadius: 0, borderWidth: 2 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { 
                            type: 'time', 
                            time: { unit: 'day', displayFormats: { day: 'MMM d' } }, 
                            grid: { display: false }, 
                            ticks: { 
                                font: { size: 8, weight: 'bold' }, 
                                color: 'rgba(32, 25, 60, 0.4)',
                                maxTicksLimit: 4
                            } 
                        },
                        yProg: { 
                            position: 'left', 
                            min: 0, max: 30, 
                            title: { display: true, text: 'Prog', color: '#8F1858', font: { size: 8, weight: 'bold' } },
                            ticks: { font: { size: 8 }, color: '#8F1858' }
                        },
                        yEst: { 
                            position: 'right', 
                            min: 0, max: 600, 
                            title: { display: true, text: 'Est', color: '#D25215', font: { size: 8, weight: 'bold' } },
                            ticks: { font: { size: 8 }, color: '#D25215' },
                            grid: { display: false } 
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        const toast = document.getElementById('sync-toast');
        function logSymptom(key, label) {
            let storageKey = key + "_count";
            let count = parseInt(localStorage.getItem(storageKey) || "0");
            localStorage.setItem(storageKey, count + 1);
            toast.classList.add('show');
            toast.innerHTML = `<i class="fa-solid fa-circle-notch spinner"></i><span>Logging ${label}...</span>`;
            setTimeout(() => {
                toast.innerHTML = `<i class="fa-solid fa-check" style="color:#4CAF50"></i><span>Synced</span>`;
                setTimeout(() => { toast.classList.remove('show'); }, 1500);
            }, 800);
        }

        window.onload = () => {
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            initSnapshotChart();
        };
    </script>
</body>
</html>
