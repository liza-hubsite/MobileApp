<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        .messages-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 85px 15px 160px; 
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: none;
        }
        .messages-area::-webkit-scrollbar { display: none; }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 22px;
            font-size: 14px;
            line-height: 1.5;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .bot-message {
            align-self: flex-start;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
        }

        .user-message {
            align-self: flex-end;
            background: var(--highlight);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .input-wrapper-fixed {
            position: fixed;
            bottom: 105px;
            left: 0;
            right: 0;
            padding: 0 20px;
            z-index: 1500;
        }

        .glass-input-bar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 8px 8px 8px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .glass-input-bar input {
            flex-grow: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            color: var(--text-main);
            font-family: inherit;
        }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--highlight);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
    </style>
</head>
<body class="app-container">

    <header class="app-header">
        <img src="logo.png" class="logo-img" alt="Elivive">
        <div style="font-size: 10px; font-weight: 800; opacity: 0.5; letter-spacing: 1px;">AI COMPANION</div>
    </header>

    <main class="chat-container">
        <div class="messages-area" id="chat-box">
            <div class="message bot-message">
                Hi Liza! I'm monitoring your telemetry. Since it's Day 3, your estrogen is at its lowest point. How are you feeling, or is there anything about your cycle you'd like to understand?
            </div>
        </div>

        <div class="input-wrapper-fixed">
            <div class="glass-input-bar">
                <input type="text" id="user-input" placeholder="Ask about symptoms or your cycle..." onkeypress="handleKey(event)">
                <button class="send-btn" onclick="sendMessage()">
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
            </div>
        </div>
    </main>

    <footer class="app-footer">
        <a href="home.html" class="nav-item"><i class="fa-solid fa-house"></i>Home</a>
        <a href="insights.html" class="nav-item"><i class="fa-solid fa-lightbulb"></i>Insights</a>
        <a href="charts.html" class="nav-item"><i class="fa-solid fa-chart-line"></i>Charts</a>
        <a href="ai.html" class="nav-item active"><i class="fa-solid fa-wand-magic-sparkles"></i>AI Chat</a>
    </footer>

    <script>
        const symptomMap = {
            headache: ["headache", "migraine", "head hurts", "throbbing"],
            tired: ["tired", "fatigue", "exhausted", "low energy", "sleepy"],
            cramps: ["cramps", "period pain", "abdominal pain", "belly hurts"],
            bloated: ["bloated", "bloating", "puffy", "swollen"],
            mood: ["sad", "angry", "moody", "emotional", "irritable"],
            nausea: ["nausea", "sick to my stomach", "upset stomach", "queasy"]
        };

        const insightMap = [
            {
                keywords: ["what is", "menstrual cycle", "how does it work"],
                response: "The menstrual cycle is a monthly series of hormonal changes your body goes through to prepare for a possible pregnancy. It is typically divided into four phases: Menstrual, Follicular, Ovulatory, and Luteal. Currently, you are on Day 3 of the Menstrual Phase."
            },
            {
                keywords: ["estrogen", "estradiol"],
                response: "Estradiol is the primary form of estrogen. It helps regulate your cycle and plays a key role in thickening the uterine lining. Right now, on Day 3, your levels are at their baseline, which often correlates with lower energy."
            },
            {
                keywords: ["progesterone"],
                response: "Progesterone is a hormone that rises after ovulation to help maintain a possible pregnancy. During your period (like today), it drops to its lowest level, which signals the body to begin shedding the uterine lining."
            }
        ];

        function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const userText = input.value.trim().toLowerCase();
            
            if (!userText) return;

            const userDiv = document.createElement('div');
            userDiv.className = 'message user-message';
            userDiv.innerText = input.value;
            chatBox.appendChild(userDiv);
            
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            setTimeout(() => {
                const botDiv = document.createElement('div');
                botDiv.className = 'message bot-message';
                
                let detectedSymptom = null;
                let displayLabel = "";

                // Check for symptoms first
                for (const [key, aliases] of Object.entries(symptomMap)) {
                    if (aliases.some(alias => userText.includes(alias))) {
                        detectedSymptom = key;
                        displayLabel = key.charAt(0).toUpperCase() + key.slice(1);
                        break;
                    }
                }

                if (detectedSymptom) {
                    let count = parseInt(localStorage.getItem(detectedSymptom + "_count") || "0");
                    localStorage.setItem(detectedSymptom + "_count", count + 1);
                    botDiv.innerHTML = `I've logged <b>${displayLabel}</b> to your telemetry. On Day 3, hormone withdrawal is complete, which often triggers these symptoms. <u>Check your charts</u> to see the trend.`;
                } else {
                    // Check for educational insights
                    const insight = insightMap.find(i => i.keywords.some(k => userText.includes(k)));
                    if (insight) {
                        botDiv.innerText = insight.response;
                    } else {
                        botDiv.innerText = "That's an interesting point. I'll continue to monitor your biomarkers and let you know if I see any patterns related to that.";
                    }
                }

                chatBox.appendChild(botDiv);
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 800);
        }

        function handleKey(e) { if (e.key === 'Enter') sendMessage(); }
    </script>
</body>
</html>
