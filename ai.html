<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: linear-gradient(180deg, #faf9f6 0%, #f2f1ee 100%);
            position: relative;
            overflow: hidden;
        }

        /* 1. WELCOME VIEW */
        #welcome-view {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 40px;
            text-align: center;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .triangle-logo-large { width: 80px; margin-bottom: 25px; opacity: 0.9; }

        /* 2. CHAT VIEW */
        #chat-view {
            display: none;
            flex-grow: 1;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.4s ease;
            height: 100%; /* Ensure it fills container */
        }

        .messages-area {
            flex-grow: 1;
            overflow-y: auto;
            /* Extra bottom padding so messages don't get stuck behind the input bar */
            padding: 90px 20px 200px; 
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth; /* Smooth scrolling animation */
            scrollbar-width: none;
        }
        .messages-area::-webkit-scrollbar { display: none; }

        .message-wrapper { display: flex; align-items: flex-end; gap: 10px; max-width: 85%; }
        .bot-wrapper { align-self: flex-start; }
        .user-wrapper { align-self: flex-end; flex-direction: row-reverse; }

        .bot-icon {
            width: 26px; height: 26px; border-radius: 50%;
            background: white; padding: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }

        .message { padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.5; }
        .bot-message { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(0,0,0,0.05); color: #20193C; border-bottom-left-radius: 4px; }
        .user-message { background: #BC3E2D; color: white; border-bottom-right-radius: 4px; }

        /* 3. INPUT BAR */
        .input-wrapper-fixed {
            position: fixed; bottom: 110px; left: 0; right: 0; padding: 0 20px; z-index: 1500;
        }
        .glass-input-bar {
            background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px);
            border: 1px solid #eee; border-radius: 35px; padding: 6px 6px 6px 20px;
            display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .glass-input-bar input { flex-grow: 1; border: none; background: transparent; outline: none; font-size: 15px; color: #20193C; }
        .send-btn { width: 44px; height: 44px; border-radius: 50%; background: #20193C; color: white; border: none; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="app-container">

    <header class="app-header">
        <img src="logo.png" class="logo-img" onclick="location.href='home.html'">
        <i class="fa-solid fa-cog" onclick="location.href='settings.html'"></i>
    </header>

    <main class="chat-container">
        <div id="welcome-view">
            <img src="triangle_logo.png" class="triangle-logo-large" alt="AI">
            <div class="welcome-text">
                <h2 style="font-size: 24px; font-weight: 800; color: #20193C; margin: 0 0 10px;">How can I help, Liza?</h2>
                <p style="font-size: 14px; opacity: 0.6; color: #20193C; margin-bottom: 30px;">Ask about your current cycle day, phase, or log a symptom.</p>
            </div>
            <div class="capability-list" style="width: 100%; display: flex; flex-direction: column; gap: 10px;">
                <div onclick="quickSend('What day of my cycle am I on?')" style="background:white; padding:15px; border-radius:18px; font-size:12px; font-weight:700; cursor:pointer; border:1px solid #f0f0f0;">“What day of my cycle am I on?”</div>
                <div onclick="quickSend('Log a headache')" style="background:white; padding:15px; border-radius:18px; font-size:12px; font-weight:700; cursor:pointer; border:1px solid #f0f0f0;">“Log a headache”</div>
            </div>
        </div>

        <div id="chat-view">
            <div class="messages-area" id="chat-box"></div>
        </div>

        <div class="input-wrapper-fixed">
            <div class="glass-input-bar">
                <input type="text" id="user-input" placeholder="Message EliVive AI..." onkeypress="handleKey(event)">
                <button class="send-btn" onclick="sendMessage()">
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
            </div>
        </div>
    </main>

    <footer class="app-footer">
        <a href="home.html" class="nav-item"><i class="fa-solid fa-house"></i>Home</a>
        <a href="insights.html" class="nav-item"><i class="fa-solid fa-lightbulb"></i>Insights</a>
        <div class="nav-center-btn" onclick="openGlobalLog()"><i class="fa-solid fa-plus"></i></div>
        <a href="charts.html" class="nav-item"><i class="fa-solid fa-chart-line"></i>Charts</a>
        <a href="ai.html" class="nav-item active"><i class="fa-solid fa-wand-magic-sparkles"></i>AI Chat</a>
    </footer>

    <script>
        const symptomKeywords = {
            headache: ["headache", "migraine", "head hurts"],
            cramps: ["cramps", "period pain", "belly hurts"],
            fatigue: ["tired", "fatigue", "exhausted", "low energy"]
        };

        const cycleKnowledge = [
            { keys: ["what day", "cycle day"], resp: "You are currently on Day 3 of your cycle." },
            { keys: ["expect", "today"], resp: "On Day 3, hormone levels are at their lowest baseline. You can expect lower energy and potential cramping as your body continues the menstruation phase." },
            { keys: ["menstrual cycle", "how it work"], resp: "The menstrual cycle is a monthly process of hormonal shifts involving Estrogen and Progesterone that prepare the body for potential pregnancy." },
            { keys: ["what phase", "menstration phase", "menstruation phase"], resp: "You are currently in the Menstruation Phase, typically spanning Days 1 to 5, where the uterine lining is shed." },
            { keys: ["follicle", "follicular"], resp: "The Follicular Phase starts on Day 1 and lasts until ovulation. This is when your body matures an egg and Estrogen begins to rise." },
            { keys: ["luteal"], resp: "The Luteal Phase occurs after ovulation. Progesterone rises to thicken the uterine lining. If no pregnancy occurs, levels drop, triggering your period." }
        ];

        // NEW: Function to force scroll to bottom
        function scrollToBottom() {
            const chatBox = document.getElementById('chat-box');
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function transitionToChat() {
            const welcome = document.getElementById('welcome-view');
            const chat = document.getElementById('chat-view');
            if (welcome.style.display !== 'none') {
                welcome.style.opacity = '0';
                welcome.style.transform = 'translateY(-20px)';
                setTimeout(() => {
                    welcome.style.display = 'none';
                    chat.style.display = 'flex';
                    setTimeout(() => {
                        chat.style.opacity = '1';
                        scrollToBottom();
                    }, 50);
                }, 400);
            }
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const userText = input.value.trim().toLowerCase();
            if (!userText) return;

            transitionToChat();
            chatBox.innerHTML += `<div class="message-wrapper user-wrapper"><div class="message user-message">${input.value}</div></div>`;
            input.value = '';
            
            // Scroll after user sends
            scrollToBottom();

            setTimeout(() => {
                let botResponse = "I don't know this answer with certainty. Hormones and related biology can be complex, and I want to avoid sharing information that might be incomplete or misleading. I will look into it and get back to you once I have a clear answer.";
                for (const [symptom, aliases] of Object.entries(symptomKeywords)) {
                    if (aliases.some(alias => userText.includes(alias))) {
                        let count = parseInt(localStorage.getItem(symptom + "_count") || "0");
                        localStorage.setItem(symptom + "_count", count + 1);
                        botResponse = `I've logged that symptom to your symptom tracker.`;
                    }
                }
                const knowledge = cycleKnowledge.find(k => k.keys.some(key => userText.includes(key)));
                if (knowledge) botResponse = knowledge.resp;

                chatBox.innerHTML += `
                    <div class="message-wrapper bot-wrapper">
                        <img src="triangle_logo.png" class="bot-icon">
                        <div class="message bot-message">${botResponse}</div>
                    </div>`;
                
                // Scroll after bot replies
                scrollToBottom();
            }, 800);
        }

        function quickSend(t) { document.getElementById('user-input').value = t; sendMessage(); }
        function handleKey(e) { if (e.key === 'Enter') sendMessage(); }
        function openGlobalLog() { localStorage.setItem('triggerLogMenu', 'true'); window.location.href = 'insights.html'; }
    </script>
</body>
</html>
