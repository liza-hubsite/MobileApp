<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        .control-panel { width: 92%; margin: 10px auto; display: flex; flex-direction: column; gap: 12px; }
        .timeframe-selector { display: flex; justify-content: space-between; background: white; padding: 5px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .tf-btn { flex: 1; padding: 8px 2px; border: none; background: transparent; font-size: 10px; font-weight: 800; color: var(--text-main); opacity: 0.4; cursor: pointer; border-radius: 10px; }
        .tf-btn.active { background: var(--highlight); color: white; opacity: 1; }

        .chart-main-card { background: white; width: 92%; margin: 10px auto 20px; padding: 25px 10px 15px; border-radius: 28px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; }
        .chart-overlay-dropdown { position: absolute; top: 15px; left: 15px; z-index: 10; background: #f8f8f8; border: 1px solid #eee; padding: 4px 8px; border-radius: 10px; display: flex; align-items: center; gap: 6px; }
        .chart-overlay-dropdown select { border: none; background: transparent; font-size: 11px; font-weight: 800; color: var(--text-main); outline: none; cursor: pointer; }

        .section-label { width: 92%; margin: 20px auto 5px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text-main); opacity: 0.5; }
        canvas { width: 100% !important; height: 350px !important; }
    </style>
</head>
<body class="app-container">

    <header class="app-header">
        <img src="logo.png" class="logo-img" onclick="location.href='home.html'">
        <i class="fa-solid fa-cog" onclick="location.href='settings.html'"></i>
    </header>

    <main class="main-content">
        <div style="padding: 15px 15px 5px; width: 92%; margin: 0 auto;">
            <h1 style="margin:0; font-size: 22px;">Data Charts</h1>
            <p style="margin:2px 0; opacity:0.6; font-size: 12px;">Day 3 · Menstrual Phase</p>
        </div>

        <div class="control-panel">
            <div class="timeframe-selector">
                <button class="tf-btn" onclick="setTime(24, this)">24H</button>
                <button class="tf-btn active" onclick="setTime(168, this)">7D</button>
                <button class="tf-btn" onclick="setTime(720, this)">30D</button>
                <button class="tf-btn" onclick="setTime(2160, this)">90D</button>
                <button class="tf-btn" onclick="setTime(8760, this)">1Y</button>
            </div>
        </div>

        <div class="section-label">Hormones</div>
        <div class="chart-main-card">
            <div class="chart-overlay-dropdown">
                <i class="fa-solid fa-filter" style="font-size: 10px; color: var(--highlight);"></i>
                <select id="hormoneSelect" onchange="updateAllCharts()">
                    <option value="both">Both</option>
                    <option value="est">Estradiol</option>
                    <option value="prog">Progesterone</option>
                </select>
            </div>
            <canvas id="mainChart"></canvas>
        </div>

        <div class="section-label">Symptom Distribution</div>
        <div class="chart-main-card">
            <div class="chart-overlay-dropdown">
                <i class="fa-solid fa-clipboard-check" style="font-size: 10px; color: var(--highlight);"></i>
                <select id="symptomSelect" onchange="updateAllCharts()">
                    <option value="all">All Symptoms</option>
                    <option value="headache">Headache</option>
                    <option value="tired">Fatigue</option>
                    <option value="cramps">Cramps</option>
                    <option value="bloated">Bloating</option>
                </select>
            </div>
            <canvas id="symptomChart"></canvas>
        </div>

        <div class="section-label">Basal Body Temperature</div>
        <div class="chart-main-card">
            <div class="chart-overlay-dropdown">
                <i class="fa-solid fa-thermometer-half" style="font-size: 10px; color: var(--highlight);"></i>
                <select id="tempSelect" onchange="updateAllCharts()">
                    <option value="f">Fahrenheit (°F)</option>
                    <option value="c">Celsius (°C)</option>
                </select>
            </div>
            <canvas id="tempChart"></canvas>
        </div>

        <div class="section-label">Heart Rate</div>
        <div class="chart-main-card">
            <div class="chart-overlay-dropdown"><i class="fa-solid fa-heart-pulse" style="color:var(--highlight)"></i><span style="font-size:11px; font-weight:800; margin-left:5px;">BPM</span></div>
            <canvas id="hrChart"></canvas>
        </div>

        <div class="section-label">Sleep Duration</div>
        <div class="chart-main-card">
            <div class="chart-overlay-dropdown"><i class="fa-solid fa-moon" style="color:var(--highlight)"></i><span style="font-size:11px; font-weight:800; margin-left:5px;">Hours</span></div>
            <canvas id="sleepChart"></canvas>
        </div>

        <div style="height: 40px;"></div>
    </main>

    <footer class="app-footer">
        <a href="home.html" class="nav-item"><i class="fa-solid fa-house"></i>Home</a>
        <a href="insights.html" class="nav-item"><i class="fa-solid fa-lightbulb"></i>Insights</a>
        
        <div class="nav-center-btn" onclick="openGlobalLog()">
            <i class="fa-solid fa-plus"></i>
        </div>
        
        <a href="charts.html" class="nav-item"><i class="fa-solid fa-chart-line"></i>Charts</a>
        <a href="ai.html" class="nav-item"><i class="fa-solid fa-wand-magic-sparkles"></i>AI Chat</a>
    </footer>

    <script>
        function openGlobalLog() {
    // If we are already on the insights page, just open the menu
    if (window.location.pathname.includes('insights.html')) {
        openLogMenu();
    } else {
        // Otherwise, go to insights and tell it to open the menu on arrival
        localStorage.setItem('triggerLogMenu', 'true');
        window.location.href = 'insights.html';
    }
}
        let charts = {};
        let currentHours = 168;
        const SEED = 42.0;

        function seededRandom(s) { const x = Math.sin(s) * 10000; return x - Math.floor(x); }

        function generateData(hours) {
            const data = { prog: [], est: [], temp: [], hr: [], sleep: [], labels: [], symptoms: { headache:[], tired:[], cramps:[], bloated:[] } };
            const now = new Date();
            let currentCycleDay = 3;

            for (let i = hours; i >= 0; i--) {
                const hourDate = new Date(now.getTime() - i * 60 * 60 * 1000);
                const totalHoursAgo = hours - i;
                const cyclePosDays = (currentCycleDay + totalHoursAgo / 24) % 28;
                const hourOfDay = hourDate.getHours();

                // --- HORMONE DATA (LOCKED) ---
                let est, prog;
                if (cyclePosDays <= 5) {
                    est = 38 - (cyclePosDays * 4.5); 
                    prog = 0.9 - (cyclePosDays * 0.2);
                } else if (cyclePosDays > 5 && cyclePosDays <= 14) {
                    est = 20 + Math.pow((cyclePosDays-5)/9, 3) * 250;
                    prog = 0.2;
                } else {
                    const peakDay = 21; 
                    const dist = Math.abs(cyclePosDays - peakDay);
                    prog = 0.5 + 15 * Math.exp(-(dist * dist) / 12);
                    est = 60 + 100 * Math.exp(-(dist * dist) / 20);
                }
                data.est.push(est); 
                data.prog.push(prog);

                // --- BBT (LOCKED) ---
                data.temp.push(cyclePosDays < 14 ? 97.5 + seededRandom(i)*0.2 : 98.4 + seededRandom(i)*0.2);

                // --- HR (TRUE RANDOMIZED SPIKES) ---
                let hrBase = 62 + Math.sin(cyclePosDays/5)*5 + (seededRandom(i)*6);
                
                // Randomly decide if there is a workout on this specific day (dayHash)
                let dayHash = Math.floor(totalHoursAgo / 24);
                let hasWorkout = seededRandom(dayHash + 500) > 0.4; // 60% chance of workout day
                let workoutStartHour = Math.floor(seededRandom(dayHash + 99) * 14) + 7; // Random hour between 7am and 9pm

                if (hasWorkout && hourOfDay === workoutStartHour) {
                    hrBase = 155 + (seededRandom(i) * 25); // Spike up to 180
                } else if (hourOfDay >= 23 || hourOfDay <= 6) {
                    hrBase -= 8; // Resting sleep dip
                }
                data.hr.push(hrBase);

                // --- SLEEP ---
                if (hours === 24) {
                    data.sleep.push((hourOfDay >= 23 || hourOfDay <= 7) ? 1 : 0);
                } else if (i % 24 === 0) {
                    data.sleep.push(7.0 + seededRandom(i)*2.0);
                } else {
                    data.sleep.push(null);
                }

                // --- SYMPTOMS ---
                Object.keys(data.symptoms).forEach(s => {
                    let weight = (s === 'cramps' && cyclePosDays < 4) ? 0.45 : 0.07;
                    data.symptoms[s].push(seededRandom(i+s.length) < weight ? Math.floor(seededRandom(i)*4) : 0);
                });

                data.labels.push(hourDate);
            }
            return data;
        }

        function initCharts() {
            const data = generateData(currentHours);
            const downsample = currentHours > 720 ? 24 : 1;
            const fL = data.labels.filter((_, i) => i % downsample === 0);
            const commonX = { type: 'time', time: { unit: currentHours <= 24 ? 'hour' : 'day' }, grid: { display: false }, ticks: { font: { size: 9, weight: 'bold' }, color: '#20193C' } };

            // 1. HORMONE CHART (LOCKED)
            const hType = document.getElementById('hormoneSelect').value;
            if (charts.hormone) charts.hormone.destroy();
            charts.hormone = new Chart(document.getElementById('mainChart'), {
                type: 'line',
                data: { labels: fL, datasets: [
                    { data: (hType==='both'||hType==='prog')?data.prog.filter((_,i)=>i%downsample===0):[], borderColor:'#8F1858', yAxisID:'yProg', tension:0.4, pointRadius:0, fill:true, backgroundColor:'rgba(143,24,88,0.05)' },
                    { data: (hType==='both'||hType==='est')?data.est.filter((_,i)=>i%downsample===0):[], borderColor:'#D25215', yAxisID:'yEst', tension:0.4, pointRadius:0, fill:true, backgroundColor:'rgba(210,82,21,0.05)' }
                ]},
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: commonX,
                        yProg: { position: 'left', display: true, min: 0, max: 30, title: { display: (hType!=='est'), text: 'Progesterone (ng/mL)', font: {weight:'bold'} }, ticks: { display: (hType!=='est') } },
                        yEst: { position: 'right', display: true, min: 0, max: 600, title: { display: (hType!=='prog'), text: 'Estradiol (pg/mL)', font: {weight:'bold'} }, ticks: { display: (hType!=='prog') }, grid: { drawOnChartArea: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });

            // 2. SYMPTOM CHART (THICKEST BARS)
            const sType = document.getElementById('symptomSelect').value;
            const sDatasets = [];
            const sColors = ['#BC3E2D', '#8F1858', '#D25215', '#0891b2'];
            Object.keys(data.symptoms).forEach((s, idx) => {
                if (sType === 'all' || sType === s) {
                    sDatasets.push({ label: s, data: data.symptoms[s].filter((_,i)=>i%downsample===0), backgroundColor: sColors[idx], barPercentage: 1.0, categoryPercentage: 1.0 });
                }
            });
            if (charts.symptom) charts.symptom.destroy();
            charts.symptom = new Chart(document.getElementById('symptomChart'), {
                type: 'bar',
                data: { labels: fL, datasets: sDatasets },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: commonX, y: { beginAtZero: true, ticks: { stepSize: 1 } } }, plugins: { legend: { display: false } } }
            });

            // 3. TEMP CHART (LOCKED)
            const tUnit = document.getElementById('tempSelect').value;
            if (charts.temp) charts.temp.destroy();
            charts.temp = new Chart(document.getElementById('tempChart'), {
                type: 'line',
                data: { labels: fL, datasets: [{ data: tUnit==='f'?data.temp.filter((_,i)=>i%downsample===0):data.temp.map(v=>(v-32)*5/9).filter((_,i)=>i%downsample===0), borderColor: '#20193C', tension: 0.4, pointRadius: 0 }]},
                options: { responsive: true, maintainAspectRatio: false, scales: { x: commonX, y: { title: { display: true, text: `Temp (°${tUnit.toUpperCase()})`, font: {weight:'bold'} } } }, plugins: { legend: { display: false } } }
            });

            // 4. HR CHART (IMPROVED VARIABILITY)
            if (charts.hr) charts.hr.destroy();
            charts.hr = new Chart(document.getElementById('hrChart'), {
                type: 'line',
                data: { labels: fL, datasets: [{ data: data.hr.filter((_,i)=>i%downsample===0), borderColor: '#BC3E2D', tension: 0.25, pointRadius: currentHours > 1000 ? 0 : 0.5 }]},
                options: { responsive: true, maintainAspectRatio: false, scales: { x: commonX, y: { min: 40, max: 200 } }, plugins: { legend: { display: false } } }
            });

            // 5. SLEEP CHART (THICKEST BARS)
            if (charts.sleep) charts.sleep.destroy();
            charts.sleep = new Chart(document.getElementById('sleepChart'), {
                type: 'bar',
                data: { labels: fL, datasets: [{ data: data.sleep.filter((_,i)=>i%downsample===0), backgroundColor: 'rgba(32, 25, 60, 0.4)', barPercentage: 1.0, categoryPercentage: 1.0 }]},
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    scales: { 
                        x: commonX, 
                        y: { 
                            title: { display: true, text: currentHours === 24 ? 'Status' : 'Hours' },
                            ticks: currentHours === 24 ? { callback: (val) => val === 1 ? 'Sleep' : 'Wake' } : {},
                            min: 0, max: currentHours === 24 ? 1.1 : 12 
                        } 
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function setTime(h, btn) {
            currentHours = h;
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            initCharts();
        }

        function updateAllCharts() { initCharts(); }
        window.onload = initCharts;
    </script>
</body>
</html>
